name: Build and deploy

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          # nmcp 1.4.x requires JDK 17+; bytecode target is set by the toolchain in build.gradle.kts.
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Verify Central Portal credentials are present
        env:
          USER: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          PASS: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          if [[ -z "$USER" ]]; then
            echo "::error::Secret CENTRAL_PORTAL_USERNAME is empty or missing"
            exit 1
          fi
          if [[ -z "$PASS" ]]; then
            echo "::error::Secret CENTRAL_PORTAL_PASSWORD is empty or missing"
            exit 1
          fi
          echo "Credentials are present (username length=${#USER}, password length=${#PASS})."

      - name: Build and publish snapshot
        if: startsWith(github.ref, 'refs/heads/')
        run: ./gradlew build publish --no-daemon
        env:
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}

      - name: Derive release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Releasing version: $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and publish release to Central Portal
        if: startsWith(github.ref, 'refs/tags/v')
        run: >-
          ./gradlew build publishAggregationToCentralPortal --no-daemon
          -Pversion=${{ steps.version.outputs.value }}
        env:
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Publish release to Gradle Plugin Portal
        if: startsWith(github.ref, 'refs/tags/v')
        run: >-
          ./gradlew publishPlugins --no-daemon
          -Pversion=${{ steps.version.outputs.value }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
